<div class="page-container content-list">
  <h1>Actualités</h1>

  <div class="search-container">
    <input
      type="text"
      placeholder="Rechercher dans les actualités..."
      class="search-input"
      (input)="onSearch($event)"
      #searchInput
    />

    @if (searchInput.value) {
      <button type="button" class="clear-button" (click)="clearSearch(searchInput)">✕</button>
    }
  </div>

  @if (loading()) {
    <p class="loading-message">Chargement des actualités...</p>
  } @else if (actualites().length === 0) {
    <p class="empty-message">Aucune actualité disponible.</p>
  } @else {
    <ul>
      @for (article of actualites(); track article.id) {
        <li class="article-card">
          <a
            [routerLink]="['/Actualites', article.id + '-' + article.slug]"
            [innerHTML]="article.title.rendered"
          ></a>
        </li>
      }
    </ul>

    <div class="pagination">
      <button (click)="previousPage()" [disabled]="page() === 1">← Précédent</button>

      <span>Page {{ page() }} / {{ totalPages() }}</span>

      <button (click)="nextPage()" [disabled]="page() >= totalPages()">Suivant →</button>
    </div>
  }
</div>
